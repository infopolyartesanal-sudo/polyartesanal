<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#1a0a00"/>
<title>PolyArtesanal — Sistema de Gestión</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0f0800;--bg2:#1a1000;--bg3:#251800;
  --border:#3d2800;--border2:#5a3d00;
  --gold:#f5a623;--gold2:#ffcc66;--gold-dim:#7a5010;
  --text:#f0e0c0;--text2:#a08060;--text3:#604030;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Georgia',serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.logo{font-size:48px;text-align:center;margin-bottom:8px;}
h1{font-size:20px;color:var(--gold);text-align:center;letter-spacing:.5px;margin-bottom:4px;}
p{font-size:12px;color:var(--text2);text-align:center;margin-bottom:32px;font-family:system-ui,sans-serif;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:400px;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;text-decoration:none;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .15s;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
.card:hover{border-color:var(--border2);background:var(--bg3);}
.card .icon{font-size:28px;}
.card .name{font-size:13px;font-weight:700;color:var(--text);font-family:system-ui,sans-serif;text-align:center;}
.card .sub{font-size:10px;color:var(--text2);font-family:system-ui,sans-serif;text-align:center;}
.card-central{grid-column:1/-1;}
</style>
</head>
<body>
  <div class="logo">🏭</div>
  <h1>PolyArtesanal</h1>
  <p>Sistema de Gestión — Seleccioná tu sector</p>
  <div class="grid">
    <a href="central.html" class="card card-central" style="--accent:#f5a623;">
      <span class="icon">🏭</span>
      <span class="name">Central</span>
      <span class="sub">Gestión general · Alertas · Pedidos</span>
    </a>
    <a href="asistente_panaderia.html" class="card" style="--accent:#f57f17;">
      <span class="icon">🍞</span>
      <span class="name">Panadería</span>
      <span class="sub">Producción y stock</span>
    </a>
    <a href="asistente_pasteleria.html" class="card" style="--accent:#c2185b;">
      <span class="icon">🍰</span>
      <span class="name">Pastelería</span>
      <span class="sub">Producción y stock</span>
    </a>
    <a href="asistente_cocina.html" class="card" style="--accent:#2e7d32;">
      <span class="icon">🍳</span>
      <span class="name">Cocina</span>
      <span class="sub">Producción y stock</span>
    </a>
    <a href="asistente_madrugada.html" class="card" style="--accent:#e64a19;">
      <span class="icon">🌅</span>
      <span class="name">Madrugada</span>
      <span class="sub">Horneado y despacho</span>
    </a>
    <a href="asistente_deposito.html" class="card" style="--accent:#1565c0;">
      <span class="icon">📦</span>
      <span class="name">Depósito</span>
      <span class="sub">Materias primas · Facturas</span>
    </a>
    <a href="asistente_salon.html" class="card" style="--accent:#6a1b9a;">
      <span class="icon">🏪</span>
      <span class="name">Salón</span>
      <span class="sub">Atención y pedidos</span>
    </a>
  </div>
</body>
</html>
